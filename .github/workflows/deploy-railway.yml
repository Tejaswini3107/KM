# GitHub Actions workflow for .NET 10 deployment to Railway
# This workflow deploys your KacharaManagement.API project to Railway only after CI passes.

name: Deploy to Railway

on:
  workflow_run:
    workflows: [".NET CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KacharaManagement.API/KacharaManagement.API.csproj

      - name: Build
        run: dotnet build KacharaManagement.API/KacharaManagement.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish KacharaManagement.API/KacharaManagement.API.csproj --configuration Release --output ./publish --no-restore

      - name: Deploy to Railway
        uses: railwayapp/actions@v1
        with:
          command: up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT: production
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
          RAILWAY_ROOT_DIRECTORY: ./publish
