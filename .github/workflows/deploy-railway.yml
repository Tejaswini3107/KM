# GitHub Actions workflow for .NET 10 deployment to Railway
# This workflow builds and deploys your KacharaManagement.API project to Railway on every push to main.

name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KacharaManagement.API/KacharaManagement.API.csproj

      - name: Build
        run: dotnet build KacharaManagement.API/KacharaManagement.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish KacharaManagement.API/KacharaManagement.API.csproj --configuration Release --output ./publish --no-restore

      - name: Deploy to Railway
        uses: railwayapp/cli-action@v1
        with:
          command: up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT: production
          RAILWAY_SERVICE: <your-railway-service-id>
          RAILWAY_ROOT_DIRECTORY: ./publish
