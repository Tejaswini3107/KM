name: .NET CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Restore dependencies
      run: dotnet restore KacharaManagement.sln
    - name: Build
      run: dotnet build KacharaManagement.sln --configuration Release --no-restore
    - name: Test
      run: dotnet test KacharaManagement.sln --no-build --verbosity normal
    - name: Publish
      run: dotnet publish KacharaManagement.API/KacharaManagement.API.csproj --configuration Release --output ./publish
