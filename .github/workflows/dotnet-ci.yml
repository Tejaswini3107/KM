name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KacharaManagement.API/KacharaManagement.API.csproj

      - name: Build
        run: dotnet build KacharaManagement.API/KacharaManagement.API.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal
